<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字提取器</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 供瀏覽器直接編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
          const [originalImage, setOriginalImage] = useState(null);
          const [displayImage, setDisplayImage] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);
          const [progress, setProgress] = useState(0); 
          const [results, setResults] = useState([]); 
          const [history, setHistory] = useState([]); 
          const [error, setError] = useState("");
          const [copySuccess, setCopySuccess] = useState(false);
          const [activeTab, setActiveTab] = useState('current'); 
          const [os, setOs] = useState('Windows'); 
          
          const [isCropMode, setIsCropMode] = useState(false);
          const [selection, setSelection] = useState(null); 
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

          const fileInputRef = useRef(null);
          const imageRef = useRef(null);
          
          // 自動偵測作業系統
          useEffect(() => {
            const platform = window.navigator.platform.toLowerCase();
            const userAgent = window.navigator.userAgent.toLowerCase();
            if (platform.includes('mac') || userAgent.includes('mac')) {
              setOs('Mac');
            } else {
              setOs('Windows');
            }

            // 動態載入 Tesseract.js
            if (!window.Tesseract) {
              const script = document.createElement('script');
              script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
              script.async = true;
              document.head.appendChild(script);
            }
          }, []);

          const cmdKey = os === 'Mac' ? 'Cmd' : 'Ctrl';

          // 處理貼上事件
          useEffect(() => {
            const handlePaste = (e) => {
              const items = e.clipboardData.items;
              for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                  const blob = items[i].getAsFile();
                  loadLocalFile(blob);
                  break;
                }
              }
            };
            window.addEventListener('paste', handlePaste);
            return () => window.removeEventListener('paste', handlePaste);
          }, []);

          const loadLocalFile = (file) => {
            if (!file) return;
            setError("");
            setResults([]);
            const reader = new FileReader();
            reader.onload = (e) => {
              setOriginalImage(e.target.result);
              setDisplayImage(e.target.result);
              setIsCropMode(true); 
            };
            reader.readAsDataURL(file);
          };

          // 強化影像處理：透過 Canvas 進行二值化與銳化
          const preprocessImage = (imgSource, select = null) => {
            return new Promise((resolve) => {
              const img = new Image();
              img.src = imgSource;
              img.onload = () => {
                const canvas = document.createElement('canvas');
                let srcX = 0, srcY = 0, srcW = img.naturalWidth, srcH = img.naturalHeight;

                if (select && imageRef.current) {
                  const scaleX = img.naturalWidth / imageRef.current.width;
                  const scaleY = img.naturalHeight / imageRef.current.height;
                  srcX = select.x * scaleX;
                  srcY = select.y * scaleY;
                  srcW = select.w * scaleX;
                  srcH = select.h * scaleY;
                }

                const zoom = 2;
                canvas.width = srcW * zoom;
                canvas.height = srcH * zoom;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                  // 改進影像處理：轉灰階並增強對比，取代暴力的二值化，保留逗號的邊緣細節
                  const r = data[i], g = data[i+1], b = data[i+2];
                  let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                  gray = gray < 128 ? Math.max(0, gray - 30) : Math.min(255, gray + 30);
                  data[i] = data[i+1] = data[i+2] = gray;
                }
                ctx.putImageData(imageData, 0, 0);
                
                resolve(canvas.toDataURL('image/png'));
              };
            });
          };

          const handleMouseDown = (e) => {
            if (!isCropMode || !imageRef.current) return;
            const rect = imageRef.current.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            setDragStart({ x, y });
            setSelection({ x, y, w: 0, h: 0 });
            setIsDragging(true);
          };

          const handleMouseMove = (e) => {
            if (!isDragging || !isCropMode || !imageRef.current) return;
            const rect = imageRef.current.getBoundingClientRect();
            const curX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const curY = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

            setSelection({
              x: Math.min(dragStart.x, curX),
              y: Math.min(dragStart.y, curY),
              w: Math.abs(curX - dragStart.x),
              h: Math.abs(curY - dragStart.y)
            });
          };

          const confirmCropAndAnalyze = async () => {
            if (!window.Tesseract) {
              setError("OCR 引擎尚未準備好，請稍候再試。");
              setTimeout(confirmCropAndAnalyze, 1000);
              return;
            }
            setIsProcessing(true);
            const processedData = await preprocessImage(originalImage, selection && selection.w > 10 ? selection : null);
            setDisplayImage(processedData);
            setIsCropMode(false);
            setSelection(null);
            localOcrRecognize(processedData);
          };

          const localOcrRecognize = async (imgData) => {
            setIsProcessing(true);
            setProgress(0);
            setError("");

            try {
              const worker = await window.Tesseract.createWorker('eng', 1, {
                logger: m => {
                  if (m.status === 'recognizing text') {
                    setProgress(Math.round(m.progress * 100));
                  }
                }
              });

              await worker.setParameters({
                tessedit_char_whitelist: '0123456789.,- ',
                tessedit_pageseg_mode: '6', 
                preserve_interword_spaces: '1', // 關鍵設定：保留真實的空格長度，避免欄位黏在一起
              });

              const { data: { text } } = await worker.recognize(imgData);
              await worker.terminate();

              // 強化解析邏輯：區分「欄位間的大空格」與「數字內的誤判小空格」
              const rows = text.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => {
                  // 1. 使用連續 2 個以上的空格或 Tab 來當作「切換到下一欄」的標準
                  const cells = line.split(/\s{2,}|\t+/);
                  return cells.map(cell => {
                    let cleaned = cell.trim();
                    // 2. 如果單一欄位內（如 "242 429"）有單一空格，通常是逗號被誤判成空格，直接將其轉回逗號
                    cleaned = cleaned.replace(/(\d)\s+(\d)/g, '$1,$2');
                    return cleaned;
                  }).filter(c => c.length > 0);
                });

              setResults(rows);
              
              if (rows.length > 0) {
                setHistory(prev => [{
                  id: Date.now(),
                  timestamp: new Date().toLocaleTimeString(),
                  data: rows,
                  preview: imgData 
                }, ...prev]);
                setActiveTab('current');
              }
            } catch (err) {
              console.error(err);
              setError("辨識失敗。請嘗試選取更精確的區域。");
            } finally {
              setIsProcessing(false);
              setProgress(0);
            }
          };

          const copyToClipboard = (data) => {
            const targetData = data || results;
            const tsv = targetData.map(row => row.join('\t')).join('\n');
            const el = document.createElement("textarea");
            el.value = tsv;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            setCopySuccess(true);
            setTimeout(() => setCopySuccess(false), 2000);
          };

          const loadFromHistory = (record) => {
            setResults(record.data);
            setActiveTab('current');
          };

          const deleteHistoryItem = (e, id) => {
            e.stopPropagation();
            setHistory(prev => prev.filter(item => item.id !== id));
          };

          return (
            <div className="min-h-screen p-4 md:p-8">
              <div className="max-w-7xl mx-auto">
                <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                  <div className="flex items-center gap-4">
                    <div className="bg-emerald-600 p-3 rounded-2xl shadow-xl shadow-emerald-100 ring-4 ring-emerald-50 w-14 h-14 flex items-center justify-center">
                      <i className="fa-solid fa-shield-halved text-white text-2xl"></i>
                    </div>
                    <div>
                      <h1 className="text-3xl font-black text-slate-800 tracking-tight">數字提取器 <span className="text-emerald-500 text-sm ml-2 bg-emerald-50 px-2 py-1 rounded-lg">High-Precision</span></h1>
                      <p className="text-slate-400 text-sm font-medium mt-1">
                        <span className="text-emerald-600 font-bold">100% 本地運行</span> • 已啟用影像自動優化
                      </p>
                    </div>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => fileInputRef.current?.click()} className="bg-white text-slate-600 border border-slate-200 px-6 py-3 rounded-2xl font-bold hover:bg-slate-50 transition-all flex items-center gap-2 shadow-sm">
                      <i className="fa-solid fa-upload text-lg"></i> 上傳圖片
                    </button>
                    <input type="file" ref={fileInputRef} onChange={(e) => loadLocalFile(e.target.files[0])} className="hidden" accept="image/*" />
                  </div>
                </header>

                {error && (
                  <div className="mb-6 p-4 bg-red-50 text-red-600 rounded-2xl flex items-center gap-3 border border-red-100">
                    <i className="fa-solid fa-circle-exclamation text-lg"></i>
                    <p className="font-medium">{error}</p>
                  </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className="lg:col-span-6 flex flex-col gap-4">
                    <div className={`relative border-4 border-dashed rounded-[2.5rem] flex flex-col items-center justify-center min-h-[500px] bg-white shadow-xl overflow-hidden transition-colors ${originalImage ? 'border-emerald-100' : 'border-slate-200 hover:border-emerald-400'}`}>
                      {originalImage ? (
                        <div className="relative w-full h-full flex flex-col items-center justify-center p-4">
                          <div className="relative inline-block select-none" onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={() => setIsDragging(false)}>
                            <img 
                              ref={imageRef}
                              src={isCropMode ? originalImage : displayImage} 
                              className={`max-w-full max-h-[70vh] rounded-xl object-contain shadow-2xl ${isCropMode ? 'cursor-crosshair' : ''}`}
                              draggable={false}
                              alt="Workspace"
                            />
                            {isCropMode && (
                              <div className="absolute inset-0 bg-black/40 pointer-events-none rounded-xl">
                                {selection && (
                                  <div className="absolute border-2 border-white bg-emerald-500/10 shadow-[0_0_0_9999px_rgba(0,0,0,0.5)] z-10" style={{ left: selection.x, top: selection.y, width: selection.w, height: selection.h }} />
                                )}
                              </div>
                            )}
                          </div>
                          <div className="absolute bottom-8 flex gap-3 z-20">
                            {isCropMode ? (
                              <button onClick={confirmCropAndAnalyze} className="bg-emerald-600 text-white px-10 py-3 rounded-2xl font-black shadow-2xl flex items-center gap-2 hover:scale-105 transition-transform">
                                <i className="fa-solid fa-wand-magic-sparkles text-xl"></i> 確認選區並高準度辨識
                              </button>
                            ) : (
                              <button onClick={() => { setIsCropMode(true); setDisplayImage(originalImage); }} className="bg-white/90 backdrop-blur-md text-slate-800 px-6 py-3 rounded-2xl font-bold shadow-xl border border-slate-200 flex items-center gap-2">
                                <i className="fa-solid fa-scissors text-lg"></i> 重新選取區域
                              </button>
                            )}
                            <button onClick={() => { setOriginalImage(null); setDisplayImage(null); setResults([]); }} className="bg-red-50 text-red-600 p-3 w-12 h-12 flex items-center justify-center rounded-2xl border border-red-100 hover:bg-red-100 transition-colors">
                                <i className="fa-solid fa-trash-can text-xl"></i>
                            </button>
                          </div>
                        </div>
                      ) : (
                        <div className="text-center p-12 w-full h-full flex flex-col items-center justify-center cursor-pointer group" onClick={() => fileInputRef.current?.click()}>
                          <div className="bg-emerald-50 p-12 rounded-[2.5rem] inline-flex mb-10 text-emerald-500 group-hover:scale-110 transition-transform">
                              <i className="fa-solid fa-image text-6xl"></i>
                          </div>
                          <h3 className="text-4xl font-black text-slate-800 tracking-tighter">在此貼上圖片</h3>
                          <div className="flex items-center justify-center gap-2 mt-4">
                            <kbd className="px-2 py-1 bg-slate-100 border rounded shadow-sm font-mono text-sm">{cmdKey}</kbd>
                            <span className="text-slate-300 font-bold">+</span>
                            <kbd className="px-2 py-1 bg-slate-100 border rounded shadow-sm font-mono text-sm">V</kbd>
                          </div>
                        </div>
                      )}
                    </div>
                    
                    <div className="bg-emerald-900 text-emerald-100 p-5 rounded-3xl flex items-start gap-4 shadow-lg ring-1 ring-white/10">
                      <i className="fa-solid fa-wand-magic-sparkles text-emerald-400 mt-1 text-xl"></i>
                      <div className="text-sm space-y-2">
                        <p className="font-bold text-white">如何獲得高準確度？</p>
                        <ul className="list-disc list-inside space-y-1 opacity-90">
                          <li><strong>框選愈小愈好</strong>：選取範圍盡量貼近數字邊緣。</li>
                          <li><strong>排除非數字文字</strong>：如果區域內包含大量中文字，會干擾本地引擎。</li>
                          <li><strong>自動二值化</strong>：系統會自動將背景轉為白底黑字以強化對比。</li>
                        </ul>
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-6 flex flex-col">
                    <div className="bg-white rounded-[3rem] shadow-2xl border border-slate-100 flex flex-col h-[700px] overflow-hidden">
                      <div className="flex bg-slate-50 p-2 gap-2 border-b border-slate-100">
                        <button onClick={() => setActiveTab('current')} className={`flex-1 py-3 rounded-2xl font-bold transition-all ${activeTab === 'current' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400 hover:bg-slate-100'}`}>辨識內容</button>
                        <button onClick={() => setActiveTab('history')} className={`flex-1 py-3 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400 hover:bg-slate-100'}`}>歷史紀錄 ({history.length})</button>
                      </div>

                      {activeTab === 'current' ? (
                        <div className="flex flex-col h-full overflow-hidden">
                          <div className="p-6 border-b border-slate-50 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                              <i className="fa-solid fa-list-ul text-emerald-600 text-lg"></i>
                              <h2 className="font-black text-slate-800 text-xl">結果清單</h2>
                            </div>
                            {results.length > 0 && (
                              <button onClick={() => copyToClipboard()} className={`px-6 py-3 rounded-2xl font-black shadow-md transition-all ${copySuccess ? 'bg-green-500 text-white' : 'bg-slate-900 text-white hover:bg-black'}`}>
                                {copySuccess ? '已複製' : '複製表格 (Excel)'}
                              </button>
                            )}
                          </div>
                          <div className="flex-1 overflow-auto bg-slate-50/20 p-6 relative">
                            {isProcessing && (
                              <div className="absolute inset-0 bg-white/90 z-20 flex flex-col items-center justify-center backdrop-blur-md">
                                <i className="fa-solid fa-arrows-rotate text-emerald-600 animate-spin text-4xl mb-4"></i>
                                <p className="text-slate-900 font-black text-sm uppercase italic">進行中 {progress}% ...</p>
                                <div className="w-48 h-1 bg-slate-200 rounded-full mt-4 overflow-hidden">
                                  <div className="h-full bg-emerald-500 transition-all duration-300" style={{ width: `${progress}%` }} />
                                </div>
                              </div>
                            )}
                            {results.length > 0 ? (
                              <div className="overflow-hidden border border-slate-200 rounded-[2rem] bg-white shadow-sm">
                                <table className="min-w-full divide-y divide-slate-100">
                                  <tbody className="divide-y divide-slate-50">
                                    {results.map((row, rIdx) => (
                                      <tr key={rIdx} className="hover:bg-emerald-50/30 transition-colors">
                                        {row.map((cell, cIdx) => (
                                          <td key={cIdx} className="px-5 py-4 text-base font-mono font-bold text-slate-700 border-r border-slate-50 last:border-r-0">{cell}</td>
                                        ))}
                                      </tr>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            ) : !isProcessing && (
                              <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20 text-center space-y-4">
                                <div className="p-8 rounded-full bg-white shadow-sm border border-slate-50">
                                    <i className="fa-solid fa-table text-5xl opacity-20"></i>
                                </div>
                                <p className="text-lg font-bold">請選取區域進行辨識</p>
                              </div>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div className="flex-1 overflow-auto p-6 space-y-4 bg-slate-50/20">
                          {history.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-slate-300 py-20">
                              <i className="fa-solid fa-clock-rotate-left text-6xl opacity-20 mb-4"></i>
                              <p className="font-bold">尚未有紀錄</p>
                            </div>
                          ) : (
                            history.map((record) => (
                              <div key={record.id} onClick={() => loadFromHistory(record)} className="bg-white border border-slate-100 rounded-3xl p-4 shadow-sm hover:border-emerald-200 cursor-pointer flex items-center gap-4 group transition-all">
                                <div className="w-14 h-14 bg-slate-100 rounded-xl overflow-hidden shrink-0 border border-slate-50">
                                  <img src={record.preview} className="w-full h-full object-cover opacity-60" alt="History preview" />
                                </div>
                                <div className="flex-1">
                                  <p className="font-bold text-slate-800 flex items-center gap-2">
                                    <i className="fa-regular fa-clock text-slate-400"></i> {record.timestamp}
                                  </p>
                                  <p className="text-slate-400 text-xs">{record.data.length} 行數據</p>
                                </div>
                                <div className="flex gap-2">
                                  <button onClick={(e) => { e.stopPropagation(); copyToClipboard(record.data); }} className="p-3 text-slate-300 hover:text-emerald-600 hover:bg-emerald-50 rounded-xl transition-all">
                                    <i className="fa-regular fa-copy"></i>
                                  </button>
                                  <button onClick={(e) => deleteHistoryItem(e, record.id)} className="p-3 text-slate-300 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all opacity-0 group-hover:opacity-100">
                                    <i className="fa-solid fa-trash-can"></i>
                                  </button>
                                </div>
                              </div>
                            ))
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
